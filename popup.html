<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 14px;
    }
    .input-group input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #ffa116; /* LeetCode orange */
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background-color: #eee;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background-color: #ffa116;
      width: 0%;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <h2>LeetCode Exporter</h2>
  
  <div class="input-group">
    <label for="username">LeetCode Username</label>
    <input type="text" id="username" placeholder="e.g. neetcode" />
  </div>

  <button id="exportBtn">Export Solved Questions</button>
  
  <div id="status"></div>
  <div class="progress-bar" id="progressBarContainer">
    <div class="progress-fill" id="progressBar"></div>
  </div>

  <!-- We will load SheetJS later for Stage 4 -->
  <script src="popup.js"></script>
</body>
</html>
